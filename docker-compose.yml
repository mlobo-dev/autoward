services:
  execution-layer:
    build: 
      context: ./execution-layer
      dockerfile: Dockerfile
    container_name: execution-layer
    ports:
      - "3000:3000"
      - "3001:3001" # MCP Server Port
    environment:
      - NODE_ENV=development
      - KEYCLOAK_URL=http://keycloak:8080
      - OPA_URL=http://opa:8181
      - DATABASE_URL=postgresql://postgres:postgres@audit-db:5432/audit_db
      - KUBECONFIG=/root/.kube/config
    volumes:
      - ./execution-layer:/usr/src/app
      - /usr/src/app/node_modules
      - ./kube/config:/root/.kube/config:ro # Mount local kubeconfig adjusted for Docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - audit-db
      - keycloak
      - opa

    networks:
      - wolf_network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://audit-db:5432/keycloak_db
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=postgres
    ports:
      - "8085:8080"
    volumes:
      - ./governance/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      - audit-db
    networks:
      - wolf_network

  opa:
    image: openpolicyagent/opa:latest
    container_name: opa
    command: run --server --log-level debug --addr :8181 --watch /policies
    ports:
      - "8185:8181"
    volumes:
      - ./governance/opa/policies:/policies
    networks:
      - wolf_network

  audit-db:
    image: postgres:15-alpine
    container_name: audit-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_MULTIPLE_DATABASES=audit_db,keycloak_db
    ports:
      - "5435:5432"
    volumes:
      - ./governance/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - wolf_network

networks:
  wolf_network:
    external: true
